# CI for the dora workspace.
#
# The old `actions-rs/*` actions (toolchain@v1, cargo@v1) are archived and run
# on the deprecated Node 12 runtime, so they emit warnings and will eventually
# stop working. This workflow uses the maintained `dtolnay/rust-toolchain`,
# runs cargo directly, and caches builds with `Swatinem/rust-cache`.

name: Actions

on:
  push:
    branches: [master]
  pull_request:

# A branch push that also has an open PR would otherwise trigger two identical
# runs. Scoping `push` to master (above) avoids that, and this cancels any
# superseded in-progress run for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, beta]
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache build
        uses: Swatinem/rust-cache@v2
        with:
          # keep stable/beta caches separate
          key: ${{ matrix.rust }}

      - name: Run cargo check
        run: cargo check --all-features

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Allow ICMP socket creation
        run: sudo sysctl -w net.ipv4.ping_group_range="0 2147483647"

      - name: Run cargo test
        run: cargo test --all-features --exclude register_derive_impl --workspace

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      # rustfmt does not compile the crate, so no build cache is needed here.
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Run cargo clippy
        run: cargo clippy -- -D warnings

  coverage:
    name: Run coverage
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Allow ICMP socket creation
        run: sudo sysctl -w net.ipv4.ping_group_range="0 2147483647"

      - name: Generate code coverage
        run: cargo llvm-cov --all-features --exclude register_derive_impl --workspace --no-fail-fast --lcov --output-path lcov.info

      - name: Coveralls upload
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: lcov.info
