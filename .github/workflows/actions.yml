# CI for the dora workspace.
#
# The old `actions-rs/*` actions (toolchain@v1, cargo@v1) are archived and run
# on the deprecated Node 12 runtime, so they emit warnings and will eventually
# stop working. This workflow uses the maintained `dtolnay/rust-toolchain`,
# runs cargo directly, and caches builds with `Swatinem/rust-cache`.

name: Actions

on:
  push:
    branches: [main]
  pull_request:

# A branch push that also has an open PR would otherwise trigger two identical
# runs. Scoping `push` to main (above) avoids that, and this cancels any
# superseded in-progress run for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # Detect whether this change can affect the container image. The image build
  # is the slowest job in CI, so on pull requests we only run it when something
  # that actually feeds the image changed (source, deps, the Containerfile, or
  # this workflow). Pushes to `main` always build (see the `docker` job's `if`).
  changes:
    name: Detect image-relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      image: ${{ steps.filter.outputs.image }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Filter paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            image:
              - 'crates/**'
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'infra-build/**'
              - '.github/workflows/actions.yml'

  # `clippy` already compiles the whole workspace on stable and fails on any
  # error, so a separate stable `cargo check` would be pure duplication. Keep a
  # beta-only build as an early warning for upcoming-compiler breakage.
  # (Add `continue-on-error: true` if you'd rather beta not gate merges.)
  check:
    name: Check (beta)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@beta

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Run cargo check
        run: cargo check --all-features

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    # dora is Postgres-only; the test suite connects to a real database (each
    # test provisions its own transient DB via PostgresDb::new_test), so CI
    # runs a Postgres service. Builds stay offline via SQLX_OFFLINE + the
    # committed sqlx-data.json; only the running tests need this service.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dora
          POSTGRES_PASSWORD: dora
          POSTGRES_DB: dora
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://dora:dora@localhost:5432/dora
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Allow ICMP socket creation
        run: sudo sysctl -w net.ipv4.ping_group_range="0 2147483647"

      # The integration-tests harness execs the service binaries (dora-migrate,
      # dora-v4, dora-v6) as child processes, locating them in target/. nextest
      # only builds test targets, not those [[bin]] crates (and a test crate
      # cannot depend on binary-only crates to force it), so build them first.
      - name: Build service binaries
        run: cargo build --all-features --workspace --bins

      - name: Run tests
        run: cargo nextest run --all-features --workspace --exclude register_derive_impl

      # nextest does not run doctests, so run them separately to keep them covered
      - name: Run doctests
        run: cargo test --all-features --workspace --exclude register_derive_impl --doc

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      # rustfmt does not compile the crate, so no build cache is needed here.
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Run cargo clippy
        run: cargo clippy -- -D warnings

  openapi:
    name: OpenAPI validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      # structurally validate the management API contract that external-api
      # embeds and serves at /openapi.json
      - name: Validate docs/openapi.yaml
        run: |
          pip install --quiet openapi-spec-validator
          openapi-spec-validator docs/openapi.yaml

  coverage:
    name: Run coverage
    runs-on: ubuntu-latest
    # See the `test` job: the suite is Postgres-backed, so coverage needs the
    # same service and DATABASE_URL.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: dora
          POSTGRES_PASSWORD: dora
          POSTGRES_DB: dora
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      CARGO_INCREMENTAL: "0"
      DATABASE_URL: postgres://dora:dora@localhost:5432/dora
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Allow ICMP socket creation
        run: sudo sysctl -w net.ipv4.ping_group_range="0 2147483647"

      # Coverage runs through nextest so it honors the serial test-groups in
      # .config/nextest.toml (the v6 server-id and integration-tests netns tests
      # share global OS state and must not run concurrently).
      #
      # The integration-tests harness execs the service binaries (dora-migrate,
      # dora-v4, dora-v6) as child processes. Use the `llvm-cov show-env` flow so
      # those binaries are built WITH coverage instrumentation and are present in
      # target/ before the tests run: source the env, build the bins, run plain
      # nextest (still honoring the groups), then emit the report. This also
      # captures the spawned processes' coverage, not just the in-process tests.
      - name: Generate code coverage
        run: |
          source <(cargo llvm-cov show-env --export-prefix)
          cargo llvm-cov clean --workspace
          cargo build --all-features --workspace --bins
          cargo nextest run --all-features --exclude register_derive_impl --workspace --no-fail-fast
          cargo llvm-cov report --lcov --output-path lcov.info

      - name: Coveralls upload
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: lcov.info

  # Build the container image for both architectures as a PR check (build only,
  # never pushed). Each arch builds natively on its own runner (no QEMU). The
  # runtime base is Iron Bank's hardened UBI 10, which requires authenticating to
  # registry1.dso.mil with the REPO1_USER / REPO1 org secrets. Skipped on fork
  # PRs (which cannot access those secrets) and on PRs that don't touch anything
  # image-relevant (see the `changes` job). Pushes to main and `v*` tags are
  # built AND published to GHCR by the separate `release.yml` workflow, so this
  # job intentionally does not run on push (no duplicate build).
  docker:
    name: Container image (${{ matrix.service }} / ${{ matrix.platform }})
    needs: changes
    if: >-
      github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      needs.changes.outputs.image == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        # one single-binary image per service, built for each architecture
        service: [v4, v6, api, migrate]
        platform: [linux/amd64, linux/arm64]
        # attach the arch label + native runner to each platform
        include:
          - platform: linux/amd64
            arch: amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            arch: arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Iron Bank
        uses: docker/login-action@v3
        with:
          registry: registry1.dso.mil
          username: ${{ secrets.REPO1_USER }}
          password: ${{ secrets.REPO1 }}

      # Persist the cargo registry and the compiled `target/` dir across runs.
      # The Containerfile exposes these as BuildKit cache mounts; cache-dance
      # restores them into the build and extracts them back out afterwards so
      # actions/cache can store them. Keyed per-arch (the two matrix legs run on
      # separate runners) and rolled by commit sha so every run saves the latest
      # incremental state, falling back to the most recent prior cache.
      - name: Cache Rust build artifacts
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            buildkit-cache/cargo-registry
            buildkit-cache/cargo-git
            buildkit-cache/target
          key: buildkit-rust-${{ matrix.arch }}-${{ github.sha }}
          restore-keys: |
            buildkit-rust-${{ matrix.arch }}-

      - name: Inject build cache into BuildKit
        uses: reproducible-containers/buildkit-cache-dance@v3.4.0
        with:
          builder: ${{ steps.buildx.outputs.name }}
          cache-map: |
            {
              "buildkit-cache/cargo-registry": "/usr/local/cargo/registry",
              "buildkit-cache/cargo-git": "/usr/local/cargo/git",
              "buildkit-cache/target": "/usr/src/dora/target"
            }

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra-build/Containerfile
          platforms: ${{ matrix.platform }}
          push: false
          build-args: |
            SERVICE=${{ matrix.service }}
          tags: dora-${{ matrix.service }}:${{ github.sha }}
          # The heavy compile artifacts live in the cache mounts above, so the
          # gha layer cache only needs to carry the small final-image layers
          # (runtime base + binary) — mode=min keeps that export cheap. Scope per
          # service+platform so the four services don't clobber each other's
          # final-layer cache.
          cache-from: type=gha,scope=${{ matrix.service }}-${{ matrix.platform }}
          cache-to: type=gha,mode=min,scope=${{ matrix.service }}-${{ matrix.platform }}
