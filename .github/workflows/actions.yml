# CI for the dora workspace.
#
# The old `actions-rs/*` actions (toolchain@v1, cargo@v1) are archived and run
# on the deprecated Node 12 runtime, so they emit warnings and will eventually
# stop working. This workflow uses the maintained `dtolnay/rust-toolchain`,
# runs cargo directly, and caches builds with `Swatinem/rust-cache`.

name: Actions

on:
  push:
    branches: [master]
  pull_request:

# A branch push that also has an open PR would otherwise trigger two identical
# runs. Scoping `push` to master (above) avoids that, and this cancels any
# superseded in-progress run for the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token.
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # `clippy` already compiles the whole workspace on stable and fails on any
  # error, so a separate stable `cargo check` would be pure duplication. Keep a
  # beta-only build as an early warning for upcoming-compiler breakage.
  # (Add `continue-on-error: true` if you'd rather beta not gate merges.)
  check:
    name: Check (beta)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@beta

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Run cargo check
        run: cargo check --all-features

  test:
    name: Test Suite
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Install nextest
        uses: taiki-e/install-action@nextest

      - name: Allow ICMP socket creation
        run: sudo sysctl -w net.ipv4.ping_group_range="0 2147483647"

      - name: Run tests
        run: cargo nextest run --all-features --workspace --exclude register_derive_impl

      # nextest does not run doctests, so run them separately to keep them covered
      - name: Run doctests
        run: cargo test --all-features --workspace --exclude register_derive_impl --doc

  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      # rustfmt does not compile the crate, so no build cache is needed here.
      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Run cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Run cargo clippy
        run: cargo clippy -- -D warnings

  coverage:
    name: Run coverage
    runs-on: ubuntu-latest
    env:
      CARGO_INCREMENTAL: "0"
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache build
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Allow ICMP socket creation
        run: sudo sysctl -w net.ipv4.ping_group_range="0 2147483647"

      - name: Generate code coverage
        run: cargo llvm-cov --all-features --exclude register_derive_impl --workspace --no-fail-fast --lcov --output-path lcov.info

      - name: Coveralls upload
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: lcov.info

  # Build the container image for both architectures. Each arch builds natively
  # on its own runner (no QEMU). The runtime base is Iron Bank's hardened UBI 10,
  # which requires authenticating to registry1.dso.mil with the REPO1_USER /
  # REPO1 org secrets. Skipped on fork PRs, which cannot access those secrets.
  docker:
    name: Container image (${{ matrix.platform }})
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout sources
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Iron Bank
        uses: docker/login-action@v3
        with:
          registry: registry1.dso.mil
          username: ${{ secrets.REPO1_USER }}
          password: ${{ secrets.REPO1 }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra-build/Containerfile
          platforms: ${{ matrix.platform }}
          push: false
          tags: dora:${{ github.sha }}
          # scope the layer cache per-arch so the two builds don't clobber it
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,mode=max,scope=${{ matrix.platform }}
