# Advertise the dora LoadBalancer Service IPs over BGP so the DHCP VIPs are
# reachable as anycast (ECMP across the nodes running each server) and the API's
# site-local IP is routable within the site.
#
# This plugs into the cluster's EXISTING Cilium BGP setup rather than defining
# its own peering: a running cluster already has a CiliumBGPClusterConfig +
# CiliumBGPPeerConfig peering the upstream router, and the peer config selects
# advertisements by label. dora only ships the advertisement below.
#
# The `advertise:` label MUST match your CiliumBGPPeerConfig's
# `spec.families[].advertisements.matchLabels`. Find it with:
#   kubectl get ciliumbgppeerconfig -o yaml | grep -A2 advertisements
# The default here (`k3s-pod-cidrs`) matches the windep cluster's peer config.
#
# If your cluster has NO BGP peering yet, apply a cluster/peer config first — see
# deploy/examples/cilium-bgp-peer.example.yaml.
apiVersion: cilium.io/v2
kind: CiliumBGPAdvertisement
metadata:
  name: dora-services
  labels:
    # selected by the cluster's CiliumBGPPeerConfig (EDIT to match yours)
    advertise: k3s-pod-cidrs
spec:
  advertisements:
    - advertisementType: Service
      service:
        addresses:
          - LoadBalancerIP
      # advertise both the anycast VIPs (v4/v6 servers) and the site-local API IP
      selector:
        matchExpressions:
          - key: dora.io/lb-pool
            operator: In
            values:
              - anycast
              - site-local
