apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Namespaces are set explicitly on each namespaced resource (the Cilium LB-IPAM
# and BGP resources are cluster-scoped and must NOT be namespaced), so this base
# deliberately does not use the global `namespace:` transformer.
resources:
  - namespace.yaml
  - vips.yaml
  - dora-config.yaml
  - db-secret.yaml
  - db.yaml
  - v4.yaml
  - v6.yaml
  - api.yaml
  - cilium-lb-ipam.yaml
  - cilium-bgp.yaml

# Every dora workload runs this image. Defaults to the GHCR image published by
# the release workflow; override per environment (e.g. an Iron Bank mirror) with
#   cd deploy/overlays/k8s && kustomize edit set image usg-dora=<registry>/usg-dora:<tag>
images:
  - name: usg-dora
    newName: ghcr.io/192d-wing/usg-dora
    newTag: latest

# The three VIPs are defined once in the dora-vips ConfigMap and copied from
# there into each Service's requested address (io.cilium/lb-ipam-ips) AND its
# Cilium LB-IPAM pool block, so an address is never set in two places.
replacements:
  # IPv4 anycast VIP -> v4 Service + anycast pool block [0]
  - source:
      kind: ConfigMap
      name: dora-vips
      fieldPath: data.ipv4_vip
    targets:
      - select:
          kind: Service
          name: usg-dora-v4-server
        fieldPaths:
          - metadata.annotations.[io.cilium/lb-ipam-ips]
      - select:
          kind: CiliumLoadBalancerIPPool
          name: dora-anycast
        fieldPaths:
          - spec.blocks.0.start
          - spec.blocks.0.stop
  # IPv6 anycast VIP -> v6 Service + anycast pool block [1]
  - source:
      kind: ConfigMap
      name: dora-vips
      fieldPath: data.ipv6_vip
    targets:
      - select:
          kind: Service
          name: usg-dora-v6-server
        fieldPaths:
          - metadata.annotations.[io.cilium/lb-ipam-ips]
      - select:
          kind: CiliumLoadBalancerIPPool
          name: dora-anycast
        fieldPaths:
          - spec.blocks.1.start
          - spec.blocks.1.stop
  # site-local API VIP -> api Service + site-local pool block [0]
  - source:
      kind: ConfigMap
      name: dora-vips
      fieldPath: data.api_vip
    targets:
      - select:
          kind: Service
          name: usg-dora-api
        fieldPaths:
          - metadata.annotations.[io.cilium/lb-ipam-ips]
      - select:
          kind: CiliumLoadBalancerIPPool
          name: dora-site-local
        fieldPaths:
          - spec.blocks.0.start
          - spec.blocks.0.stop
