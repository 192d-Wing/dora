# usg-dora-db: the PostgreSQL instance backing all dora roles.
#
# A single-replica StatefulSet with a PersistentVolumeClaim. dora runs its
# embedded migrations against this database on startup, so no init job is
# needed. For HA Postgres, replace this with an operator (e.g. CloudNativePG)
# — dora only needs a connection string.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: usg-dora-db
  namespace: dora
  labels:
    app.kubernetes.io/name: usg-dora-db
    app.kubernetes.io/component: database
    app.kubernetes.io/part-of: usg-dora
spec:
  serviceName: usg-dora-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: usg-dora-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: usg-dora-db
        app.kubernetes.io/component: database
        app.kubernetes.io/part-of: usg-dora
    spec:
      containers:
        - name: postgres
          image: postgres:16
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: dora-db
          env:
            # keep the data subdir off the volume mount root
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "dora", "-d", "dora"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "dora", "-d", "dora"]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        # storageClassName is set per-environment by the overlays (k3s: local-path)
        resources:
          requests:
            storage: 10Gi
---
apiVersion: v1
kind: Service
metadata:
  name: usg-dora-db
  namespace: dora
  labels:
    app.kubernetes.io/name: usg-dora-db
    app.kubernetes.io/part-of: usg-dora
spec:
  # headless is unnecessary here; a stable ClusterIP is all dora needs
  selector:
    app.kubernetes.io/name: usg-dora-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
