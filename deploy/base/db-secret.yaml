# Database credentials shared by Postgres (usg-dora-db) and the dora workloads.
#
# EXAMPLE ONLY — do not ship these values. Replace with a real secret managed
# out-of-band (sealed-secrets, external-secrets, SOPS, Vault, ...). `DATABASE_URL`
# must point at the usg-dora-db Service and match POSTGRES_USER/PASSWORD/DB.
apiVersion: v1
kind: Secret
metadata:
  name: dora-db
  namespace: dora
type: Opaque
stringData:
  POSTGRES_USER: dora
  POSTGRES_PASSWORD: "CHANGE_ME"
  POSTGRES_DB: dora
  DATABASE_URL: postgres://dora:CHANGE_ME@usg-dora-db:5432/dora
