# Cilium LB-IPAM pools that assign the LoadBalancer Service IPs.
#
# Two pools keep the DHCP anycast VIPs and the management API's IP separate, as
# required: the servers share an anycast pool (one v4 + one v6 VIP), the API
# draws a distinct site-local address.
#
# The single-address blocks below are populated from the dora-vips ConfigMap via
# Kustomize `replacements` (see kustomization.yaml) — edit the VIPs there, not
# here. Requires Cilium with LB-IPAM enabled.
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: dora-anycast
spec:
  serviceSelector:
    matchLabels:
      dora.io/lb-pool: anycast
  blocks:
    # [0] v4 anycast VIP (usg-dora-v4_server) — set from dora-vips.ipv4_vip
    - start: "203.0.113.10"
      stop: "203.0.113.10"
    # [1] v6 anycast VIP (usg-dora-v6_server) — set from dora-vips.ipv6_vip
    - start: "2001:db8:a11::10"
      stop: "2001:db8:a11::10"
---
apiVersion: cilium.io/v2
kind: CiliumLoadBalancerIPPool
metadata:
  name: dora-site-local
spec:
  serviceSelector:
    matchLabels:
      dora.io/lb-pool: site-local
  blocks:
    # [0] site-local API VIP (usg-dora-api) — set from dora-vips.api_vip
    - start: "10.201.0.10"
      stop: "10.201.0.10"
