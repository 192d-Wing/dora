# Cilium LB-IPAM pools that assign the LoadBalancer Service IPs.
#
# Two pools keep the DHCP anycast VIPs and the management API's IP separate, as
# required: the servers share an anycast pool (one v4 + one v6 VIP), the API
# draws a distinct site-local address.
#
# Requires Cilium with LB-IPAM enabled. EDIT the CIDRs for your site; the
# `io.cilium/lb-ipam-ips` annotations on the Services must fall inside these.
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: dora-anycast
spec:
  serviceSelector:
    matchLabels:
      dora.io/lb-pool: anycast
  blocks:
    # v4 anycast VIP range for usg-dora-v4_server (EDIT)
    - cidr: "203.0.113.0/29"
    # v6 anycast VIP range for usg-dora-v6_server (EDIT)
    - cidr: "2001:db8:a11::/124"
---
apiVersion: cilium.io/v2alpha1
kind: CiliumLoadBalancerIPPool
metadata:
  name: dora-site-local
spec:
  serviceSelector:
    matchLabels:
      dora.io/lb-pool: site-local
  blocks:
    # site-local range for the management API (usg-dora-api) (EDIT).
    # Use an address reachable only within the site (RFC1918 / ULA), not the
    # publicly-anycast DHCP VIP range.
    - cidr: "10.201.0.0/29"
