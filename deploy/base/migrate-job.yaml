# usg-dora-migrate: run-once database schema migrator (the `dora-migrate` binary
# / usg-dora-migrate image).
#
# In the split deployment the services connect WITHOUT migrating on startup, so
# the schema is owned here. This Job applies any pending migrations against the
# shared Postgres and exits; it is idempotent, so re-running against an
# up-to-date database is a no-op. This standalone Job is an explicit pre-rollout
# migration; each service Deployment ALSO runs dora-migrate as an initContainer,
# which is what actually orders the schema ahead of that pod (a Job and the
# Deployments applied together have no ordering between them).
#
# `dora-migrate` reads the connection string from the DATABASE_URL env var (the
# env fallback of the `-d` flag — there is no `--database-url` long form); the
# `--dora-log` arg is a flag so the entrypoint forwards it straight to the binary
# instead of taking the DHCP interface-wait path.
apiVersion: batch/v1
kind: Job
metadata:
  name: usg-dora-migrate
  namespace: dora
  labels:
    app.kubernetes.io/name: usg-dora-migrate
    app.kubernetes.io/part-of: usg-dora
spec:
  backoffLimit: 6
  # keep finished Jobs around briefly for inspection, then auto-clean
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: usg-dora-migrate
        app.kubernetes.io/part-of: usg-dora
    spec:
      restartPolicy: OnFailure
      containers:
        - name: migrate
          image: usg-dora-migrate:latest
          args:
            - "--dora-log"
            - "info"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: dora-db
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              memory: 128Mi
