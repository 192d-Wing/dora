apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: usg-dora-db
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dora.labels" . | nindent 4 }}
    app.kubernetes.io/name: usg-dora-db
    app.kubernetes.io/component: database
spec:
  serviceName: usg-dora-db
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: usg-dora-db
  template:
    metadata:
      labels:
        {{- include "dora.labels" . | nindent 8 }}
        app.kubernetes.io/name: usg-dora-db
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: {{ .Values.db.image }}
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: dora-db
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.db.user | quote }}, "-d", {{ .Values.db.name | quote }}]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", {{ .Values.db.user | quote }}, "-d", {{ .Values.db.name | quote }}]
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            {{- toYaml .Values.resources.db | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.db.storageClass }}
        storageClassName: {{ .Values.db.storageClass | quote }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.db.storageSize }}
---
apiVersion: v1
kind: Service
metadata:
  name: usg-dora-db
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "dora.labels" . | nindent 4 }}
    app.kubernetes.io/name: usg-dora-db
spec:
  selector:
    app.kubernetes.io/name: usg-dora-db
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
