apiVersion: batch/v1
kind: Job
metadata:
  name: usg-dora-migrate
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "dora.labels" . | nindent 4 }}
    app.kubernetes.io/name: usg-dora-migrate
spec:
  backoffLimit: 6
  ttlSecondsAfterFinished: 600
  template:
    metadata:
      labels:
        {{- include "dora.labels" . | nindent 8 }}
        app.kubernetes.io/name: usg-dora-migrate
    spec:
      restartPolicy: OnFailure
      containers:
        {{- include "dora.initMigrate" . | nindent 8 }}
