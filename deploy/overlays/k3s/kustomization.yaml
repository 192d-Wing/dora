apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# K3s overlay.
#
# Cluster prerequisites (do these when installing k3s — they are not manifests):
#   * Disable k3s's bundled servicelb (Klipper) and flannel so Cilium owns
#     LoadBalancer IPs and CNI:  `--disable=servicelb --flannel-backend=none
#     --disable-network-policy`
#   * Install Cilium with kube-proxy replacement, LB-IPAM, and the BGP control
#     plane enabled.
# Otherwise Klipper and Cilium fight over the LoadBalancer Services.
resources:
  - ../../base

# k3s ships the local-path provisioner as its default storage class.
patches:
  - target:
      kind: StatefulSet
      name: usg-dora-db
    patch: |
      - op: add
        path: /spec/volumeClaimTemplates/0/spec/storageClassName
        value: local-path
