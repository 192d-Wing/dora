apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Full Kubernetes (managed / kubeadm / etc.) overlay.
resources:
  - ../../base

# Bind the Postgres volume to your cluster's block storage class. EDIT to match
# your cluster (e.g. `gp3`, `standard`, `csi-...`).
patches:
  - target:
      kind: StatefulSet
      name: usg-dora-db
    patch: |
      - op: add
        path: /spec/volumeClaimTemplates/0/spec/storageClassName
        value: standard
