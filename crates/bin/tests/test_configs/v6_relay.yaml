# v6 config for the relayed-message integration tests. The server is bound to
# loopback on a non-default port (so it unicasts replies) and relayed messages
# select the 2001:db8:1::/64 network by the relay link-address.
v6:
    server_id:
        type: LL
        identifier: fe80::1
        persist: false
        path: /tmp/dora_v6_relay_sid
    networks:
        2001:db8:1::/64:
            config:
                lease_time:
                    default: 3600
                preferred_time:
                    default: 3600
            ranges:
                - start: 2001:db8:1::100
                  end: 2001:db8:1::1ff
                  config:
                      lease_time:
                          default: 3600
                      preferred_time:
                          default: 3600
                  options:
                      values: {}
            pd_pools:
                - prefix: 2001:db8:100::/56
                  delegated_len: 64
                  config:
                      lease_time:
                          default: 3600
                      preferred_time:
                          default: 3600
